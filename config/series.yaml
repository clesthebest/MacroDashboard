app:
  title: US Macro Dashboard
  source_name: FRED
  source_url: https://fred.stlouisfed.org/

series:
  - id: DFF
    label: Effective Federal Funds Rate
    page: Rates
    category: Policy
    frequency: daily
    format: percent
    source: FRED
    transforms: [level, change, pct_change]
    default_transform: level
    notes: Effective daily policy rate.

  - id: GS10
    label: 10-Year Treasury Yield
    page: Rates
    category: Treasuries
    frequency: daily
    format: percent
    source: FRED
    transforms: [level, change, pct_change]
    default_transform: level
    notes: Constant maturity 10-year Treasury yield.

  - id: DGS1MO
    label: 1-Month Treasury Yield
    page: Rates
    category: Treasury Curve
    frequency: daily
    format: percent
    source: FRED
    transforms: [level, change]
    default_transform: level
    notes: 1-month constant maturity Treasury yield.

  - id: DGS3MO
